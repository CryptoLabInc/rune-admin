name: Pull Request

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "deployment/**"
      - "LICENSE"
      - ".githooks/**"
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "deployment/**"
      - "LICENSE"
      - ".githooks/**"

concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: [self-hosted, vault-ci]
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        env:
          MISE_ENV: ci
      - run: mise run setup
      - name: Clean previous fixtures
        run: rm -rf tests/fixtures/
      - name: Decrypt test fixtures
        env:
          FIXTURES_GPG_PASSPHRASE: ${{ secrets.FIXTURES_GPG_PASSPHRASE_ALT }}
        run: mise run fixtures:decrypt
      - name: Check (gofmt + vet + tests)
        run: mise run check
      - name: Build
        run: |
          VERSION=$(git describe --tags --always 2>/dev/null || echo "dev")
          VERSION=$VERSION mise run go:build
      - name: Clean up fixtures
        if: always()
        run: rm -rf tests/fixtures/
