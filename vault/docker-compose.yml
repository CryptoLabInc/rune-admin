services:
  vault:
    build:
      context: .
      dockerfile: Dockerfile
    image: rune-vault:latest
    container_name: rune-vault

    volumes:
      - vault-keys:/app/vault_keys:rw
      - ./certs:/app/certs:rw
      - ./backups:/secure/backups:rw
      - ./logs:/var/log/rune-vault:rw

    environment:
      - VAULT_TOKENS=${VAULT_TOKENS:-}
      - VAULT_TLS_CERT=${VAULT_TLS_CERT:-}
      - VAULT_TLS_KEY=${VAULT_TLS_KEY:-}
      - VAULT_TLS_DISABLE=${VAULT_TLS_DISABLE:-}
      - VAULT_INDEX_NAME=${VAULT_INDEX_NAME:-runecontext}
      - ENVECTOR_ENDPOINT=${ENVECTOR_ENDPOINT:-}
      - ENVECTOR_API_KEY=${ENVECTOR_API_KEY:-}
      - EMBEDDING_DIM=${EMBEDDING_DIM:-384}

    networks:
      - vault-net

    ports:
      - "0.0.0.0:50051:50051"
      - "127.0.0.1:9090:9090"

    security_opt:
      - no-new-privileges:true

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9090/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M
          cpus: "0.5"


networks:
  vault-net:
    driver: bridge

volumes:
  vault-keys:
