# vault-deployment.yml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: rune-vault
spec:
  replicas: 2  # warm standby
  selector:
    matchLabels:
      app: rune-vault
  template:
    metadata:
      labels:
        app: rune-vault
    spec:
      containers:
      - name: rune-vault
        image: envector/rune-vault:latest

        volumeMounts:
        - name: keys
          mountPath: /secure/keys
          readOnly: false
        - name: tls-certs
          mountPath: /app/certs
          readOnly: true

        env:
        - name: VAULT_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: vault-secrets
              key: encryption-key
        - name: VAULT_TLS_CERT
          value: /app/certs/tls.crt
        - name: VAULT_TLS_KEY
          value: /app/certs/tls.key

        ports:
        - containerPort: 50051
          protocol: TCP
        - containerPort: 9090
          protocol: TCP

        readinessProbe:
          grpc:
            port: 50051
          initialDelaySeconds: 5
          periodSeconds: 10

        livenessProbe:
          grpc:
            port: 50051
          initialDelaySeconds: 10
          periodSeconds: 20

        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"

        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false

      volumes:
      - name: keys
        persistentVolumeClaim:
          claimName: vault-keys-pvc
      - name: tls-certs
        secret:
          secretName: vault-tls
          optional: true

      # Anti-affinity: Don't run both replicas on same node
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - rune-vault
            topologyKey: kubernetes.io/hostname
