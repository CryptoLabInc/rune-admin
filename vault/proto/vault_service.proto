syntax = "proto3";

package rune.vault.v1;

import "buf/validate/validate.proto";

// Rune-Vault gRPC service.
// Holds the FHE secret key and performs all decryption operations.
service VaultService {
  // Returns the agent manifest (EncKey, agent credentials, optional team index name).
  rpc GetAgentManifest(GetAgentManifestRequest) returns (GetAgentManifestResponse);

  // Decrypts FHE-encrypted similarity scores and applies Top-K filtering.
  rpc DecryptScores(DecryptScoresRequest) returns (DecryptScoresResponse);

  // Decrypts a list of AES-encrypted metadata strings.
  rpc DecryptMetadata(DecryptMetadataRequest) returns (DecryptMetadataResponse);

  // Marks item_ids as logically deleted by unioning them into the
  // per-index deny-list. Idempotent. Write scope: mark_deleted.
  rpc MarkDeleted(MarkDeletedRequest) returns (MarkDeletedResponse);

  // Given candidate item_ids, returns the subset that is on the
  // per-index deny-list. Read scope: filter_deleted.
  rpc FilterDeleted(FilterDeletedRequest) returns (FilterDeletedResponse);
}

// ─── GetAgentManifest ─────────────────────────────────────────────

message GetAgentManifestRequest {
  // Auth token. Required, Fixed 36 chars (evt_ + 32 hex).
  string token = 1 [(buf.validate.field).string = {min_len: 36, max_len: 36}];
}

message GetAgentManifestResponse {
  // JSON string: {"EncKey.json": "...", "index_name": "...", "agent_id": "...", ...}
  string manifest_json = 1;
  string error = 2;  // Non-empty on error
}

// ─── DecryptScores ─────────────────────────────────────────────────

message DecryptScoresRequest {
  // Auth token. Required, Fixed 36 chars (evt_ + 32 hex).
  string token = 1 [(buf.validate.field).string = {min_len: 36, max_len: 36}];
  // Base64-encoded CiphertextScore protobuf. Required.
  string encrypted_blob_b64 = 2 [(buf.validate.field).string.min_len = 1];
  // Number of top results to return.
  // Per-role limits (e.g., admin=50, member=10) enforced at the business logic layer.
  int32  top_k = 3 [(buf.validate.field).int32 = {gte: 1, lte: 300}];
}

message ScoreEntry {
  int32  shard_idx = 1;
  int32  row_idx   = 2;
  double score     = 3;
}

message DecryptScoresResponse {
  repeated ScoreEntry results = 1;  // Top-K results sorted by score descending
  string error = 2;                 // Non-empty on error
}

// ─── DecryptMetadata ───────────────────────────────────────────────

message DecryptMetadataRequest {
  // Auth token. Required, Fixed 36 chars (evt_ + 32 hex).
  string token = 1 [(buf.validate.field).string = {min_len: 36, max_len: 36}];
  // Base64-encoded AES blobs. Required, max 1000 items, each non-empty.
  repeated string encrypted_metadata_list = 2 [(buf.validate.field).repeated = {
    min_items: 1,
    max_items: 1000,
    items: {string: {min_len: 1}}
  }];
}

message DecryptMetadataResponse {
  // Each element is a JSON-serialized decrypted metadata object
  repeated string decrypted_metadata = 1;
  string error = 2;  // Non-empty on error
}

// ─── MarkDeleted ───────────────────────────────────────────────────

message MarkDeletedRequest {
  // Auth token. Required, Fixed 36 chars (evt_ + 32 hex).
  string token = 1 [(buf.validate.field).string = {min_len: 36, max_len: 36}];
  // enVector index the deny-list belongs to. Required.
  string index_name = 2 [(buf.validate.field).string.min_len = 1];
  // Stable enVector item_ids to mark deleted. Required, max 10000, deduped server-side.
  repeated uint64 item_ids = 3 [(buf.validate.field).repeated = {
    min_items: 1,
    max_items: 10000
  }];
}

message MarkDeletedResponse {
  // Total deny-list size for the index after this mark (post-union).
  uint64 count = 1;
  // Monotonic deny-list version for the index after this mark.
  uint64 version = 2;
  string error = 3;  // Non-empty on error
}

// ─── FilterDeleted ─────────────────────────────────────────────────

message FilterDeletedRequest {
  // Auth token. Required, Fixed 36 chars (evt_ + 32 hex).
  string token = 1 [(buf.validate.field).string = {min_len: 36, max_len: 36}];
  // enVector index the deny-list belongs to. Required.
  string index_name = 2 [(buf.validate.field).string.min_len = 1];
  // Candidate item_ids to check. Required, max 10000.
  repeated uint64 item_ids = 3 [(buf.validate.field).repeated = {
    min_items: 1,
    max_items: 10000
  }];
}

message FilterDeletedResponse {
  // Subset of the requested item_ids that is on the deny-list.
  repeated uint64 deleted_item_ids = 1;
  // Monotonic deny-list version for the index at read time.
  uint64 version = 2;
  string error = 3;  // Non-empty on error
}
