# Rune-Vault Development Environment
# Run `mise install` to set up all tools, then `mise run setup` to bootstrap.
# Prerequisites: mise (https://mise.jdx.dev)

# ── Core development tools ───────────────────────────────────────────
[tools]
go = "1.25"
buf = "1.66"

# ── Deployment tools (install with: mise install) ────────────────────
# These are needed only for cloud deployment, not for local development.
terraform = "1.14"
"aqua:aws/aws-cli" = "2"
gcloud = "562"
oci = "3"

# ── Tasks ────────────────────────────────────────────────────────────

[tasks.setup]
description = "Bootstrap development environment (Go modules + proto stubs)"
run = """
#!/usr/bin/env bash
set -euo pipefail

echo "==> Resolving Go modules..."
cd vault && go mod download && cd ..

echo "==> Generating Go proto stubs..."
cd vault && buf generate && cd ..

echo "==> Configuring git hooks..."
git config core.hooksPath .githooks

echo ""
echo "Development environment ready."
echo "Run 'mise run check' to verify."
"""

[tasks.check]
description = "Run all quality checks (gofmt + go vet + go test)"
run = """
#!/usr/bin/env bash
set -euo pipefail
cd vault
echo "==> Checking Go format..."
diff=$(gofmt -l .)
if [ -n "$diff" ]; then
  echo "gofmt found unformatted files:" >&2
  echo "$diff" >&2
  exit 1
fi
echo "==> go vet..."
go vet ./...
echo "==> Running Go tests..."
go test -race ./...
echo ""
echo "All checks passed."
"""

[tasks."proto:go"]
description = "Regenerate Go protobuf/gRPC stubs into vault/pkg/vaultpb"
run = "cd vault && buf generate"

[tasks."go:build"]
description = "Build runevault binary"
run = """
#!/usr/bin/env bash
set -euo pipefail
VERSION="${VERSION:-dev}"
COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "none")
DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
PKG="github.com/CryptoLabInc/rune-admin/vault/internal/commands"
cd vault && go build \
  -ldflags "-X '${PKG}.buildVersion=${VERSION}' -X '${PKG}.buildCommit=${COMMIT}' -X '${PKG}.buildDate=${DATE}'" \
  ./...
"""

[tasks."go:test"]
description = "Run Go unit + integration tests with race detector"
run = "cd vault && go test -race ./..."

[tasks."go:test:unit"]
description = "Run Go unit tests only (skip CLI smoke E2E)"
run = "cd vault && go test -race -short ./..."

[tasks."go:vet"]
description = "Run go vet on all Go packages"
run = "cd vault && go vet ./..."

[tasks."go:fmt"]
description = "Format Go source files"
run = "cd vault && gofmt -w ."

[tasks."go:fmt:check"]
description = "Check Go formatting without modifying"
run = """
#!/usr/bin/env bash
set -euo pipefail
cd vault
diff=$(gofmt -l .)
if [ -n "$diff" ]; then
  echo "gofmt found unformatted files:" >&2
  echo "$diff" >&2
  exit 1
fi
"""

[tasks.dev]
description = "Run runevault daemon in foreground for development"
run = "cd vault && go run ./cmd/runevault --config dev/runevault.conf daemon start"

[tasks."fixtures:decrypt"]
description = "Decrypt test fixtures from GPG archive"
run = """
#!/usr/bin/env bash
set -euo pipefail
if [ -z "${FIXTURES_GPG_PASSPHRASE:-}" ]; then
  echo "Error: FIXTURES_GPG_PASSPHRASE is not set." >&2
  exit 1
fi
gpg --decrypt --batch --yes --passphrase "$FIXTURES_GPG_PASSPHRASE" \
  -o tests/fixtures.tar.gz tests/fixtures.tar.gz.gpg
tar xzf tests/fixtures.tar.gz -C tests/
rm tests/fixtures.tar.gz
echo "Fixtures decrypted to tests/fixtures/"
"""

[tasks."fixtures:encrypt"]
description = "Encrypt test fixtures into GPG archive"
run = """
#!/usr/bin/env bash
set -euo pipefail
if [ -z "${FIXTURES_GPG_PASSPHRASE:-}" ]; then
  echo "Error: FIXTURES_GPG_PASSPHRASE is not set." >&2
  exit 1
fi
tar czf tests/fixtures.tar.gz -C tests fixtures/
gpg --symmetric --cipher-algo AES256 --batch --yes \
  --passphrase "$FIXTURES_GPG_PASSPHRASE" \
  -o tests/fixtures.tar.gz.gpg tests/fixtures.tar.gz
rm tests/fixtures.tar.gz
echo "Fixtures encrypted to tests/fixtures.tar.gz.gpg"
"""

[tasks.certs]
description = "Generate self-signed TLS certificates"
run = "bash scripts/generate-certs.sh"
