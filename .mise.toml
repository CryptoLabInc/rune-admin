# Rune-console Development Environment
# Run `mise install` to set up all tools, then `mise run setup` to bootstrap.
# Prerequisites: mise (https://mise.jdx.dev)

# ── Core development tools ───────────────────────────────────────────
[tools]
go = "1.26"
buf = "1.66"

# ── Deployment tools ─────────────────────────────────────────────────
# Deployment-only tools (terraform, aws-cli, gcloud, oci) live in
# .mise.deploy.toml so local dev and pre-commit checks never provision
# them (an unavailable tool must not block a commit).
# Install them with:  MISE_ENV=deploy mise install

[env]
CGO_ENABLED = "1"

# ── Tasks ────────────────────────────────────────────────────────────

[tasks.setup]
description = "Bootstrap development environment (Go modules + proto stubs)"
run = """
#!/usr/bin/env bash
set -euo pipefail

echo "==> Resolving Go modules..."
cd runeconsole && go mod download && cd ..

echo "==> Generating Go proto stubs..."
cd runeconsole && buf generate && cd ..

echo "==> Configuring git hooks..."
git config core.hooksPath .githooks

echo ""
echo "Development environment ready."
echo "Run 'mise run check' to verify."
"""

[tasks.check]
description = "Run all quality checks (gofmt + go vet + unit tests)"
run = """
#!/usr/bin/env bash
set -euo pipefail
cd runeconsole
echo "==> Checking Go format..."
diff=$(gofmt -l .)
if [ -n "$diff" ]; then
  echo "gofmt found unformatted files:" >&2
  echo "$diff" >&2
  exit 1
fi
echo "==> go vet..."
go vet ./...
echo "==> Running unit tests..."
go test -race ./...
echo ""
echo "All checks passed."
"""

[tasks."proto:go"]
description = "Regenerate Go protobuf/gRPC stubs into runeconsole/pkg/consolepb"
run = "cd runeconsole && buf generate"

[tasks."go:build"]
description = "Build runeconsole binary to runeconsole/bin/runeconsole"
run = """
#!/usr/bin/env bash
set -euo pipefail
VERSION="${VERSION:-dev}"
COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "none")
DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
PKG="github.com/CryptoLabInc/rune-console/runeconsole/internal/commands"
cd runeconsole && go build \
  -o bin/runeconsole \
  -ldflags "-X '${PKG}.buildVersion=${VERSION}' -X '${PKG}.buildCommit=${COMMIT}' -X '${PKG}.buildDate=${DATE}'" \
  ./cmd
"""

[tasks."go:test"]
description = "Run all tests including E2E (requires pre-built binary via RUNECONSOLE_TEST_BINARY)"
run = "cd runeconsole && go test -race -tags e2e ./..."

[tasks."go:test:unit"]
description = "Run unit tests only (E2E excluded by build tag)"
run = "cd runeconsole && go test -race ./..."

[tasks."go:test:e2e"]
description = "Run E2E tests against the pre-built runeconsole binary (run go:build first)"
run = """
#!/usr/bin/env bash
set -euo pipefail
BINARY="${RUNECONSOLE_TEST_BINARY:-$(pwd)/runeconsole/bin/runeconsole}"
if [ ! -x "$BINARY" ]; then
  echo "runeconsole binary not found at $BINARY — run 'mise run go:build' first" >&2
  exit 1
fi
export RUNECONSOLE_TEST_BINARY="$BINARY"
cd runeconsole && go test -race -tags e2e ./internal/tests/...
"""

[tasks."go:vet"]
description = "Run go vet on all Go packages"
run = "cd runeconsole && go vet ./..."

[tasks."go:fmt"]
description = "Format Go source files"
run = "cd runeconsole && gofmt -w ."

[tasks."go:fmt:check"]
description = "Check Go formatting without modifying"
run = """
#!/usr/bin/env bash
set -euo pipefail
cd runeconsole
diff=$(gofmt -l .)
if [ -n "$diff" ]; then
  echo "gofmt found unformatted files:" >&2
  echo "$diff" >&2
  exit 1
fi
"""

[tasks.dev]
description = "Run runeconsole daemon in foreground for development"
run = "cd runeconsole && go run ./cmd/runeconsole --config dev/runeconsole.conf daemon start"

[tasks."fixtures:decrypt"]
description = "Decrypt test fixtures from GPG archive"
run = """
#!/usr/bin/env bash
set -euo pipefail
if [ -z "${FIXTURES_GPG_PASSPHRASE:-}" ]; then
  echo "Error: FIXTURES_GPG_PASSPHRASE is not set." >&2
  exit 1
fi
gpg --decrypt --batch --yes --passphrase "$FIXTURES_GPG_PASSPHRASE" \
  -o tests/fixtures.tar.gz tests/fixtures.tar.gz.gpg
tar xzf tests/fixtures.tar.gz -C tests/
rm tests/fixtures.tar.gz
echo "Fixtures decrypted to tests/fixtures/"
"""

[tasks."fixtures:encrypt"]
description = "Encrypt test fixtures into GPG archive"
run = """
#!/usr/bin/env bash
set -euo pipefail
if [ -z "${FIXTURES_GPG_PASSPHRASE:-}" ]; then
  echo "Error: FIXTURES_GPG_PASSPHRASE is not set." >&2
  exit 1
fi
tar czf tests/fixtures.tar.gz -C tests fixtures/
gpg --symmetric --cipher-algo AES256 --batch --yes \
  --passphrase "$FIXTURES_GPG_PASSPHRASE" \
  -o tests/fixtures.tar.gz.gpg tests/fixtures.tar.gz
rm tests/fixtures.tar.gz
echo "Fixtures encrypted to tests/fixtures.tar.gz.gpg"
"""

[tasks.certs]
description = "Generate self-signed TLS certificates"
run = "bash scripts/generate-certs.sh"
