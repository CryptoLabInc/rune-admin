# Rune-Console Development Environment
# Run `mise install` to set up all tools, then `mise run setup` to bootstrap.
# Prerequisites: mise (https://mise.jdx.dev)

# ── Core development tools ───────────────────────────────────────────
[tools]
go = "1.26.4"
buf = "1.66"
node = "22"
pnpm = "10"

# ── Deployment tools (install with: mise install) ────────────────────
# These are needed only for cloud deployment, not for local development.
terraform = "1.14"
"aqua:aws/aws-cli" = "2"
gcloud = "562"
oci = "3"

[env]
CGO_ENABLED = "1"

# ── Tasks ────────────────────────────────────────────────────────────

[tasks.setup]
description = "Bootstrap development environment (Go modules + proto stubs)"
run = """
#!/usr/bin/env bash
set -euo pipefail

echo "==> Resolving Go modules..."
go mod download

echo "==> Generating Go proto stubs..."
buf generate

echo "==> Configuring git hooks..."
git config core.hooksPath .githooks

echo ""
echo "Development environment ready."
echo "Run 'mise run check' to verify."
"""

[tasks.check]
description = "Run all quality checks (gofmt + go vet + unit tests)"
run = """
#!/usr/bin/env bash
set -euo pipefail
echo "==> Checking Go format..."
diff=$(gofmt -l .)
if [ -n "$diff" ]; then
  echo "gofmt found unformatted files:" >&2
  echo "$diff" >&2
  exit 1
fi
echo "==> go vet..."
go vet ./...
echo "==> Running unit tests..."
go test -race ./...
echo ""
echo "All checks passed."
"""

[tasks."proto:go"]
description = "Regenerate Go protobuf/gRPC stubs into pkg/consolepb"
run = "buf generate"

[tasks."go:build"]
description = "Build runeconsole binary to bin/runeconsole (embeds the SPA build)"
depends = ["fe:build"]
run = """
#!/usr/bin/env bash
set -euo pipefail
VERSION="${VERSION:-dev}"
COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "none")
DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
PKG="github.com/CryptoLabInc/rune-console/internal/commands"
mkdir -p bin
go build \
  -o bin/runeconsole \
  -ldflags "-X '${PKG}.buildVersion=${VERSION}' -X '${PKG}.buildCommit=${COMMIT}' -X '${PKG}.buildDate=${DATE}'" \
  ./cmd
"""

[tasks."go:test"]
description = "Run all tests including E2E (requires pre-built binary via RUNECONSOLE_TEST_BINARY)"
run = "go test -race -tags e2e ./..."

[tasks."go:test:unit"]
description = "Run unit tests only (E2E excluded by build tag)"
run = "go test -race ./..."

[tasks."go:test:e2e"]
description = "Run E2E tests against the pre-built runeconsole binary (run go:build first)"
run = """
#!/usr/bin/env bash
set -euo pipefail
BINARY="${RUNECONSOLE_TEST_BINARY:-$(pwd)/bin/runeconsole}"
if [ ! -x "$BINARY" ]; then
  echo "runeconsole binary not found at $BINARY — run 'mise run go:build' first" >&2
  exit 1
fi
export RUNECONSOLE_TEST_BINARY="$BINARY"
go test -race -tags e2e ./internal/tests/...
"""

[tasks."go:vet"]
description = "Run go vet on all Go packages"
run = "go vet ./..."

[tasks."go:fmt"]
description = "Format Go source files"
run = "gofmt -w ."

[tasks."go:fmt:check"]
description = "Check Go formatting without modifying"
run = """
#!/usr/bin/env bash
set -euo pipefail
diff=$(gofmt -l .)
if [ -n "$diff" ]; then
  echo "gofmt found unformatted files:" >&2
  echo "$diff" >&2
  exit 1
fi
"""

[tasks.dev]
description = "Run runeconsole daemon in foreground for development"
run = "go run ./cmd --config dev/runeconsole.conf daemon start"

[tasks.certs]
description = "Generate self-signed TLS certificates"
run = "bash scripts/generate-certs.sh"

# ── Frontend (rune console) ──────────────────────────────────────────

[tasks."fe:setup"]
description = "Install frontend dependencies"
dir = "frontend"
run = "pnpm install --frozen-lockfile"

[tasks."fe:dev"]
description = "Run frontend dev server"
dir = "frontend"
run = "pnpm dev"

[tasks."fe:build"]
description = "Type-check and build frontend for production"
depends = ["fe:setup"]
dir = "frontend"
run = """
pnpm build
# vite emptyOutDir wipes the committed embed placeholder; restore it so a direct
# `go build`/`go test` on a fresh checkout still finds internal/console/webdist.
mkdir -p ../internal/console/webdist && touch ../internal/console/webdist/.gitkeep
"""

[tasks."fe:lint"]
description = "Lint frontend sources"
dir = "frontend"
run = "pnpm lint"

[tasks."fe:test"]
description = "Run frontend unit tests"
dir = "frontend"
run = "pnpm test"

[tasks."fe:fmt"]
description = "Format frontend sources with Prettier"
dir = "frontend"
run = "pnpm exec prettier --write ."

[tasks."fe:fmt:check"]
description = "Check frontend formatting without modifying"
dir = "frontend"
run = "pnpm exec prettier --check ."
