# Deployment tools — loaded only when MISE_ENV=deploy (merged on top of
# .mise.toml). Kept out of the default [tools] so local dev and the
# pre-commit `check` never try to provision them.
#
# Install with:  MISE_ENV=deploy mise install
[tools]
terraform = "1.14"
"aqua:aws/aws-cli" = "2"
gcloud = "562"
oci = "3"
